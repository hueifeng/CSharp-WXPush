<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知详情</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{font:16px/1.6 -apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;color:#333;background:#edf1f7}
        body{min-height:100vh;padding:32px 12px;display:flex;justify-content:center}
        .wrap{width:100%;max-width:560px}
        .badge{display:inline-block;font-size:.75rem;color:#fff;background:#5b7cfa;padding:3px 10px;border-radius:12px;margin-bottom:14px}
        .heading{font-size:1.35rem;font-weight:700;color:#222;margin-bottom:24px;line-height:1.5}
        .card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);padding:24px 28px;margin-bottom:16px}
        .body{font-size:.95rem;color:#444;line-height:1.8;word-break:break-word}
        .meta{font-size:.82rem;color:#999;display:flex;align-items:center;gap:6px}
        .meta svg{width:14px;height:14px;fill:#bbb}
        .body h1,.body h2,.body h3{color:#222;margin:1em 0 .5em;font-weight:600}
        .body h1{font-size:1.3em}.body h2{font-size:1.15em}.body h3{font-size:1.05em}
        .body p{margin-bottom:.6em}.body p:last-child{margin-bottom:0}
        .body strong{color:#222}.body a{color:#5b7cfa;text-decoration:none}
        .body a:hover{text-decoration:underline}
        .body code{background:#f3f4f8;color:#d6336c;padding:1px 5px;border-radius:3px;font-size:.88em;font-family:Menlo,Consolas,monospace}
        .body pre{background:#f7f8fc;border:1px solid #e8eaef;padding:14px;border-radius:6px;overflow-x:auto;margin:.7em 0}
        .body pre code{background:0;color:#333;padding:0}
        .body blockquote{border-left:3px solid #ddd;padding-left:14px;color:#666;margin:.7em 0}
        .body ul,.body ol{padding-left:1.6em;margin:.5em 0}.body li{margin-bottom:.3em}
        .body table{width:100%;border-collapse:collapse;margin:.7em 0;font-size:.92em}
        .body th,.body td{padding:6px 10px;text-align:left;border-bottom:1px solid #eee}
        .body th{font-weight:600;background:#fafbfd}
        .body img{max-width:100%;border-radius:6px}
        @media(max-width:480px){body{padding:16px 6px}.card{padding:18px 20px}.heading{font-size:1.15rem}}
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <span class="badge">通知</span>
        <div class="heading" id="t">通知详情</div>
        <div class="body" id="m">-</div>
    </div>
    <div class="card meta" id="d">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>
        <span>-</span>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
<script>
!function(){
    var p=new URLSearchParams(location.search),
        t=p.get('title')||'通知详情',
        m=p.get('message')||'-',
        d=p.get('date')||'-';
    document.getElementById('t').textContent=t;
    document.getElementById('m').textContent=m;
    document.getElementById('d').querySelector('span').textContent=d;
    document.title=t;
    if(typeof marked!=='undefined'){
        var el=document.getElementById('m');
        el.innerHTML=marked.parse(el.textContent);
    }
}();
</script>
</body>
</html>
